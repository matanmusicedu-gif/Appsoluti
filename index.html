<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--b1:#222;--b2:#2e2e2e;--t1:#e8e4de;--t2:#9a9590;--t3:#555;--ac:#e8a840;--acg:rgba(232,168,64,.1);--grn:#4ade80;--red:#f87171;--amb:#fbbf24;--sab:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Outfit',system-ui,sans-serif;font-weight:300;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select{font-family:inherit}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none;background:var(--s2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg);box-shadow:0 0 10px rgba(232,168,64,.35)}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.hdr{display:flex;align-items:center;justify-content:center;padding:15px 16px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg);gap:6px}
.logo{font-family:'Poiret One',sans-serif;font-size:20px;font-weight:400;letter-spacing:2px;color:var(--t1);position:relative;display:inline-flex;align-items:baseline;text-shadow:0 0 12px rgba(232,168,64,.15),0 0 25px rgba(232,168,64,.06);animation:titleGlow 12s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 10px rgba(255,255,255,.1),0 0 22px rgba(255,255,255,.05)}20%{text-shadow:0 0 10px rgba(251,191,36,.14),0 0 22px rgba(251,191,36,.07)}40%{text-shadow:0 0 10px rgba(64,224,208,.14),0 0 22px rgba(64,224,208,.07)}60%{text-shadow:0 0 10px rgba(180,120,255,.14),0 0 22px rgba(180,120,255,.07)}80%{text-shadow:0 0 10px rgba(255,150,200,.14),0 0 22px rgba(255,150,200,.07)}}
.logo-i{position:relative;display:inline-block}
.logo-i .dot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:4.5px;height:4.5px;border-radius:50%;background:var(--amb);box-shadow:0 0 6px var(--amb),0 0 14px rgba(251,191,36,.45);animation:glow 2.5s ease-in-out infinite alternate;z-index:2}
.fermata-svg{position:absolute;top:-4px;left:calc(50% - 0.3px);transform:translateX(-50%);width:12px;height:7px;z-index:1;animation:fGlow 3s ease-in-out infinite}
@keyframes glow{0%{box-shadow:0 0 4px var(--amb),0 0 8px rgba(251,191,36,.2)}100%{box-shadow:0 0 10px var(--amb),0 0 22px rgba(251,191,36,.55)}}
@keyframes fGlow{0%,100%{opacity:.5;filter:drop-shadow(0 0 2px rgba(251,191,36,.2))}50%{opacity:1;filter:drop-shadow(0 0 6px rgba(251,191,36,.6))}}
.cr{font-family:'Dancing Script',cursive;font-size:16px;color:var(--t3);margin-left:8px;letter-spacing:.5px}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0 84px;-webkit-overflow-scrolling:touch}
.tc{animation:fi .18s ease;padding:0 10px;min-height:calc(100dvh - 130px)}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@keyframes strGlow{0%,100%{transform:scale(1);filter:drop-shadow(0 0 4px rgba(251,191,36,.3))}50%{transform:scale(1.08);filter:drop-shadow(0 0 14px rgba(251,191,36,.7))}}
@keyframes strVib{0%,100%{transform:translateX(0)}25%{transform:translateX(-1px)}75%{transform:translateX(1px)}}
.str-glow{animation:strGlow .6s ease-in-out}
.str-line{transition:all .3s ease}.str-line.playing{stroke:rgba(251,191,36,.7)!important;filter:drop-shadow(0 0 6px rgba(251,191,36,.6)) drop-shadow(0 0 12px rgba(251,191,36,.3));animation:strVib .08s linear 6}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(10px);border-top:1px solid var(--b1);padding-bottom:var(--sab);z-index:100}
.ni{display:flex;justify-content:space-around;align-items:center;height:54px;max-width:560px;margin:0 auto}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;border-radius:8px;transition:.15s}
.nb svg{width:19px;height:19px}.nb span{font-size:8.5px;letter-spacing:.3px}
.nb.on{color:var(--ac)}.nb:not(.on){color:var(--t3)}
.nd{width:3px;height:3px;border-radius:50%;background:var(--ac);margin-top:1px}
.pt{display:flex;gap:2px;background:var(--s1);border-radius:10px;padding:2px;border:1px solid var(--b1)}
.pb{padding:5px 11px;border-radius:8px;font-size:11.5px;transition:.12s;white-space:nowrap}
.pb.on{background:var(--acg);color:var(--ac);border:1px solid rgba(232,168,64,.2)}.pb:not(.on){color:var(--t3);border:1px solid transparent}
.cd{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px}
.bp{padding:9px 20px;border-radius:10px;background:var(--acg);border:1px solid rgba(232,168,64,.2);color:var(--ac);font-size:13px;font-weight:400;transition:.12s}
.bp:active{transform:scale(.97)}
.plb{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.12s;border-width:2px;border-style:solid}
.plb:active{transform:scale(.9)}
.plb.go{background:var(--acg);border-color:var(--ac);color:var(--ac)}.plb.st{background:rgba(248,113,113,.06);border-color:var(--red);color:var(--red)}
.lb{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;text-align:center;display:block;margin-bottom:3px}
.ct{display:flex;flex-direction:column;align-items:center}
.dr-wrap{position:relative;width:100%;height:36px;padding:0 4px}
.dr-wrap input[type=range]{position:absolute;width:calc(100% - 8px);pointer-events:none;top:14px;left:4px;background:transparent!important}
.dr-wrap input[type=range]::-webkit-slider-thumb{pointer-events:auto;cursor:grab}
.dr-track{position:absolute;top:17px;height:6px;border-radius:3px;background:var(--ac);opacity:.35}
.bpm-val{font-size:13px;color:var(--ac);font-weight:500;min-width:36px;text-align:center;cursor:pointer;padding:2px 4px;border-radius:6px;border:1px solid transparent;transition:.15s}
.bpm-val:hover{border-color:var(--b2)}
.bpm-inp-s{width:50px;text-align:center;font-size:13px;font-weight:500;background:var(--s1);border:1px solid var(--ac);border-radius:6px;color:var(--ac);padding:2px 4px;outline:none;font-family:'Outfit'}
.fe-bg{position:relative;width:100%;height:170px;border-radius:14px;overflow:hidden;background:#0a0a12}
.fe-cv{width:100%;height:100%;display:block}
.mini-player{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);width:100%;margin-top:4px}
.mini-pp{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--ac);background:var(--acg);color:var(--ac);flex-shrink:0}
.mini-pp:active{transform:scale(.9)}
</style>

const m2f=n=>440*Math.pow(2,(n-69)/12),f2n=f=>Math.round(12*Math.log2(f/440))+69;
const cOff=(f,n)=>Math.round(1200*Math.log2(f/(440*Math.pow(2,(n-69)/12))));

/* ═══ IndexedDB ═══ */
const IDB={
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('appsoluti',1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('tracks',{keyPath:'id',autoIncrement:true})};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e)})},
  async save(name,blob){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').put({name,blob,date:Date.now()});tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})},
  async getAll(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})},
  async del(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
};
