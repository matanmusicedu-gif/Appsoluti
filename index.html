<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--b1:#222;--b2:#2e2e2e;--t1:#e8e4de;--t2:#9a9590;--t3:#555;--ac:#e8a840;--acg:rgba(232,168,64,.1);--grn:#4ade80;--red:#f87171;--amb:#fbbf24;--sab:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Outfit',system-ui,sans-serif;font-weight:300;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select{font-family:inherit}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none;background:var(--s2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg);box-shadow:0 0 10px rgba(232,168,64,.35)}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.hdr{display:flex;align-items:center;justify-content:center;padding:15px 16px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg);gap:6px}
.logo{font-family:'Poiret One',sans-serif;font-size:20px;font-weight:400;letter-spacing:2px;color:var(--t1);position:relative;display:inline-flex;align-items:baseline;text-shadow:0 0 12px rgba(232,168,64,.15),0 0 25px rgba(232,168,64,.06);animation:titleGlow 12s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 10px rgba(255,255,255,.1),0 0 22px rgba(255,255,255,.05)}20%{text-shadow:0 0 10px rgba(251,191,36,.14),0 0 22px rgba(251,191,36,.07)}40%{text-shadow:0 0 10px rgba(64,224,208,.14),0 0 22px rgba(64,224,208,.07)}60%{text-shadow:0 0 10px rgba(180,120,255,.14),0 0 22px rgba(180,120,255,.07)}80%{text-shadow:0 0 10px rgba(255,150,200,.14),0 0 22px rgba(255,150,200,.07)}}
.logo-i{position:relative;display:inline-block}
.logo-i .dot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:4.5px;height:4.5px;border-radius:50%;background:var(--amb);box-shadow:0 0 6px var(--amb),0 0 14px rgba(251,191,36,.45);animation:glow 2.5s ease-in-out infinite alternate;z-index:2}
.fermata-svg{position:absolute;top:-4px;left:calc(50% - 0.3px);transform:translateX(-50%);width:12px;height:7px;z-index:1;animation:fGlow 3s ease-in-out infinite}
@keyframes glow{0%{box-shadow:0 0 4px var(--amb),0 0 8px rgba(251,191,36,.2)}100%{box-shadow:0 0 10px var(--amb),0 0 22px rgba(251,191,36,.55)}}
@keyframes fGlow{0%,100%{opacity:.5;filter:drop-shadow(0 0 2px rgba(251,191,36,.2))}50%{opacity:1;filter:drop-shadow(0 0 6px rgba(251,191,36,.6))}}
.cr{font-family:'Dancing Script',cursive;font-size:16px;color:var(--t3);margin-left:8px;letter-spacing:.5px}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0 84px;-webkit-overflow-scrolling:touch}
.tc{animation:fi .18s ease;padding:0 10px;min-height:calc(100dvh - 130px)}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(10px);border-top:1px solid var(--b1);padding-bottom:var(--sab);z-index:100}
.ni{display:flex;justify-content:space-around;align-items:center;height:54px;max-width:560px;margin:0 auto}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;border-radius:8px;transition:.15s}
.nb svg{width:19px;height:19px}.nb span{font-size:8.5px;letter-spacing:.3px}
.nb.on{color:var(--ac)}.nb:not(.on){color:var(--t3)}
.nd{width:3px;height:3px;border-radius:50%;background:var(--ac);margin-top:1px}
.pt{display:flex;gap:2px;background:var(--s1);border-radius:10px;padding:2px;border:1px solid var(--b1)}
.pb{padding:5px 11px;border-radius:8px;font-size:11.5px;transition:.12s;white-space:nowrap}
.pb.on{background:var(--acg);color:var(--ac);border:1px solid rgba(232,168,64,.2)}.pb:not(.on){color:var(--t3);border:1px solid transparent}
.cd{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px}
.bp{padding:9px 20px;border-radius:10px;background:var(--acg);border:1px solid rgba(232,168,64,.2);color:var(--ac);font-size:13px;font-weight:400;transition:.12s}
.bp:active{transform:scale(.97)}
.plb{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.12s;border-width:2px;border-style:solid}
.plb:active{transform:scale(.9)}
.plb.go{background:var(--acg);border-color:var(--ac);color:var(--ac)}.plb.st{background:rgba(248,113,113,.06);border-color:var(--red);color:var(--red)}
.lb{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;text-align:center;display:block;margin-bottom:3px}
.ct{display:flex;flex-direction:column;align-items:center}
.dr-wrap{position:relative;width:100%;height:36px;padding:0 4px}
.dr-wrap input[type=range]{position:absolute;width:calc(100% - 8px);pointer-events:none;top:14px;left:4px;background:transparent!important}
.dr-wrap input[type=range]::-webkit-slider-thumb{pointer-events:auto;cursor:grab}
.dr-track{position:absolute;top:17px;height:6px;border-radius:3px;background:var(--ac);opacity:.35}
.bpm-val{font-size:13px;color:var(--ac);font-weight:500;min-width:36px;text-align:center;cursor:pointer;padding:2px 4px;border-radius:6px;border:1px solid transparent;transition:.15s}
.bpm-val:hover{border-color:var(--b2)}
.bpm-inp-s{width:50px;text-align:center;font-size:13px;font-weight:500;background:var(--s1);border:1px solid var(--ac);border-radius:6px;color:var(--ac);padding:2px 4px;outline:none;font-family:'Outfit'}
.fe-bg{position:relative;width:100%;height:170px;border-radius:14px;overflow:hidden;background:#0a0a12}
.fe-cv{width:100%;height:100%;display:block}
.mini-player{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);width:100%;margin-top:4px}
.mini-pp{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--ac);background:var(--acg);color:var(--ac);flex-shrink:0}
.mini-pp:active{transform:scale(.9)}
</style>
</head>
<body>
<div class="app" id="app">
<header class="hdr">
  <div class="logo">
    <span>Appsolut</span><span class="logo-i">
      <svg class="fermata-svg" viewBox="0 0 12 7"><path d="M0.5 6 C0.5 2, 6 0, 6 0 C6 0, 11.5 2, 11.5 6" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity=".9"/></svg>
      <span class="dot"></span>i
    </span>
  </div>
  <span class="cr">by Matan Margolin</span>
</header>
<main class="main" id="main"></main>
<nav class="nav"><div class="ni" id="nav"></div></nav>
</div>
<script>
const SN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],FN=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const m2f=n=>440*Math.pow(2,(n-69)/12),f2n=f=>Math.round(12*Math.log2(f/440))+69;
const cOff=(f,n)=>Math.round(1200*Math.log2(f/(440*Math.pow(2,(n-69)/12))));
const NC=['#d4a830','#6b2e8b','#b83838','#2a4888','#4488ee','#c09028','#5a2070','#993030','#1e3670','#e45090','#9050e0','#482060'];
const NCD=['#a08020','#4a1e6a','#882020','#162855','#2266cc','#806818','#381050','#701818','#0e1e48','#b03070','#6030b0','#301040'];

/* ═══ IndexedDB ═══ */
const IDB={
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('appsoluti',1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('tracks',{keyPath:'id',autoIncrement:true})};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e)})},
  async save(name,blob){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').put({name,blob,date:Date.now()});tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})},
  async getAll(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})},
  async del(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
};

/* ═══ AUDIO ENGINE ═══ */
const AE=(()=>{
let ctx,rvB,catB;
const g=()=>{if(!ctx||ctx.state==='closed')ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx};
const rv=()=>{if(rvB)return rvB;const c=g(),l=c.sampleRate*2.5,b=c.createBuffer(2,l,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.6))*.25}rvB=b;return b};
const catRv=()=>{if(catB)return catB;const c=g(),l=c.sampleRate*5,b=c.createBuffer(2,l,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++){const t=i/c.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t/2.2)*.22*(1+Math.sin(t*1.3)*.15)}}catB=b;return b};

const claves=(t,a)=>{const c=g();t=t||c.currentTime;const v=a?1:.5,fr=a?2900:2400;
  const o=c.createOscillator(),ga=c.createGain(),f=c.createBiquadFilter();o.type='sine';o.frequency.setValueAtTime(fr,t);o.frequency.exponentialRampToValueAtTime(fr*.7,t+.02);
  f.type='bandpass';f.frequency.value=fr;f.Q.value=18;ga.gain.setValueAtTime(v,t);ga.gain.exponentialRampToValueAtTime(.001,t+.07);
  o.connect(f);f.connect(ga);ga.connect(c.destination);o.start(t);o.stop(t+.08);
  if(a){const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.setValueAtTime(fr*1.5,t);g2.gain.setValueAtTime(.3,t);g2.gain.exponentialRampToValueAtTime(.001,t+.025);o2.connect(g2);g2.connect(c.destination);o2.start(t);o2.stop(t+.03)}};
const hihat=(t,a)=>{const c=g();t=t||c.currentTime;const v=a?.55:.22,dur=a?.12:.05;
  const bl=c.sampleRate*dur,buf=c.createBuffer(1,bl,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*(a?.02:.008)));
  const s=c.createBufferSource();s.buffer=buf;const hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=a?6500:8500;
  const ga=c.createGain();ga.gain.setValueAtTime(v,t);ga.gain.exponentialRampToValueAtTime(.001,t+dur);s.connect(hp);hp.connect(ga);ga.connect(c.destination);s.start(t)};
const subkick=(t,a)=>{const c=g();t=t||c.currentTime;const v=a?1:.55;
  const o=c.createOscillator(),ga=c.createGain();o.type='sine';o.frequency.setValueAtTime(a?90:78,t);o.frequency.exponentialRampToValueAtTime(40,t+.15);
  ga.gain.setValueAtTime(v,t);ga.gain.exponentialRampToValueAtTime(.001,t+.4);o.connect(ga);ga.connect(c.destination);o.start(t);o.stop(t+.42);
  if(a){const s2=c.createOscillator(),sg=c.createGain();s2.type='sawtooth';s2.frequency.setValueAtTime(200,t);s2.frequency.exponentialRampToValueAtTime(55,t+.015);sg.gain.setValueAtTime(.45,t);sg.gain.exponentialRampToValueAtTime(.001,t+.02);s2.connect(sg);sg.connect(c.destination);s2.start(t);s2.stop(t+.025)}};
const snap=(t,a)=>{const c=g();t=t||c.currentTime;const v=a?.9:.5;
  const bl=c.sampleRate*.04,buf=c.createBuffer(1,bl,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.004));
  const s=c.createBufferSource();s.buffer=buf;const bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=a?4500:5500;bp.Q.value=5;
  const ga=c.createGain();ga.gain.setValueAtTime(v,t);ga.gain.exponentialRampToValueAtTime(.001,t+.04);s.connect(bp);bp.connect(ga);ga.connect(c.destination);s.start(t)};
const sM={claves,hihat,subkick,snap};const click=(s,t,a)=>(sM[s]||claves)(t,a);
const applause=()=>{const c=g(),t=c.currentTime,bl=c.sampleRate*2.5,buf=c.createBuffer(2,bl,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<bl;i++)d[i]=(Math.random()*2-1)*Math.sin(Math.PI*i/bl)*(Math.random()>.96?.5:.07)*.4}
  const s=c.createBufferSource();s.buffer=buf;const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=.5;s.connect(f);f.connect(c.destination);s.start(t)};
const piano=(freq,dur=1.8,useRv=false)=>{const c=g(),t=c.currentTime;
  const m=c.createGain(),comp=c.createDynamicsCompressor();comp.threshold.value=-10;comp.ratio.value=3;
  m.gain.setValueAtTime(.24,t);m.gain.setValueAtTime(.2,t+.005);m.gain.exponentialRampToValueAtTime(.07,t+.25);m.gain.exponentialRampToValueAtTime(.001,t+dur);
  if(useRv){const dr=c.createGain();dr.gain.value=.6;const cv=c.createConvolver();cv.buffer=rv();const wt=c.createGain();wt.gain.value=.4;
    m.connect(comp);comp.connect(dr);dr.connect(c.destination);comp.connect(cv);cv.connect(wt);wt.connect(c.destination)}
  else{m.connect(comp);comp.connect(c.destination)}
  [1,2,3,4,5,6,7,8].forEach((h,i)=>{if(freq*h>15000)return;const A=[1,.5,.25,.14,.07,.035,.018,.008];const D=[1,.78,.6,.45,.35,.28,.2,.15];
    const o=c.createOscillator(),ga=c.createGain();o.type=i===0?'sine':i<3?'triangle':'sine';o.frequency.value=freq*h;o.detune.value=(Math.random()-.5)*3;
    ga.gain.setValueAtTime(A[i]*.55,t);ga.gain.exponentialRampToValueAtTime(.001,t+dur*D[i]);o.connect(ga);ga.connect(m);o.start(t);o.stop(t+dur)})};
const epiano=(freq,dur=1.8,useRv=false)=>{const c=g(),t=c.currentTime;
  const m=c.createGain();m.gain.setValueAtTime(.35,t);m.gain.exponentialRampToValueAtTime(.18,t+.08);m.gain.exponentialRampToValueAtTime(.001,t+dur);
  if(useRv){const dr=c.createGain();dr.gain.value=.55;const cv=c.createConvolver();cv.buffer=rv();const wt=c.createGain();wt.gain.value=.45;
    m.connect(dr);dr.connect(c.destination);m.connect(cv);cv.connect(wt);wt.connect(c.destination)}else m.connect(c.destination);
  const car=c.createOscillator(),cg=c.createGain();car.type='sine';car.frequency.value=freq;
  cg.gain.setValueAtTime(.75,t);cg.gain.exponentialRampToValueAtTime(.001,t+dur);car.connect(cg);cg.connect(m);car.start(t);car.stop(t+dur);
  const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.value=freq*2.002;
  g2.gain.setValueAtTime(.1,t);g2.gain.exponentialRampToValueAtTime(.001,t+dur*.55);o2.connect(g2);g2.connect(m);o2.start(t);o2.stop(t+dur)};
const chordPiano=(midiN,dur=3)=>{const c=g(),t=c.currentTime;
  const m=c.createGain(),cv=c.createConvolver();cv.buffer=rv();
  const dr=c.createGain();dr.gain.value=.55;const wt=c.createGain();wt.gain.value=.45;
  m.connect(dr);dr.connect(c.destination);m.connect(cv);cv.connect(wt);wt.connect(c.destination);
  m.gain.setValueAtTime(.16,t);m.gain.exponentialRampToValueAtTime(.06,t+.4);m.gain.exponentialRampToValueAtTime(.001,t+dur);
  midiN.forEach(midi=>{const freq=m2f(midi);
    [1,2,3,4,5].forEach((h,i)=>{if(freq*h>14000)return;const A=[1,.38,.16,.07,.025];
      const o=c.createOscillator(),ga=c.createGain();o.type=i<2?'sine':'triangle';o.frequency.value=freq*h;o.detune.value=(Math.random()-.5)*3;
      ga.gain.setValueAtTime(A[i]*.32,t);ga.gain.exponentialRampToValueAtTime(.001,t+dur*(1-i*.12));o.connect(ga);ga.connect(m);o.start(t);o.stop(t+dur)})})};
const chordGuitar=(midiN,dur=3)=>{const c=g(),t=c.currentTime;
  const m=c.createGain();m.gain.setValueAtTime(.18,t);m.gain.exponentialRampToValueAtTime(.001,t+dur);m.connect(c.destination);
  midiN.forEach((midi,idx)=>{const freq=m2f(midi),d=idx*.014;
    const o=c.createOscillator(),og=c.createGain();o.type='sawtooth';o.frequency.value=freq;
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(freq*4,t+d);lp.frequency.exponentialRampToValueAtTime(freq*1.2,t+d+dur*.3);
    og.gain.setValueAtTime(.28,t+d);og.gain.exponentialRampToValueAtTime(.001,t+d+dur);o.connect(lp);lp.connect(og);og.connect(m);o.start(t+d);o.stop(t+d+dur);
    const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.value=freq;
    g2.gain.setValueAtTime(.12,t+d);g2.gain.exponentialRampToValueAtTime(.001,t+d+dur*.65);o2.connect(g2);g2.connect(m);o2.start(t+d);o2.stop(t+d+dur)})};

return{g,click,applause,piano,epiano,chordPiano,chordGuitar,catRv,rv}})();

/* ── Fermatan ambient engine (global scope) ── */
let penLoops=[],lastHighTime=0;
let feMaster=null,feConv=null,feDel=null,feLoShelf=null,feHiShelf=null,feDelFb=null,feDelWet=null,feDry=null,feWet=null;
const FE_SCALES={'Pentatonic':[0,2,4,7,9],'Hexatonic':[0,2,4,5,7,9],'Dorian':[0,2,3,5,7,9,10],'Whole Tone':[0,2,4,6,8,10]};

function ensureFeChain(){
  if(feMaster)return feMaster;
  const c=AE.g();
  feMaster=c.createGain();feMaster.gain.value=S.fe.vol;
  feLoShelf=c.createBiquadFilter();feLoShelf.type='lowshelf';feLoShelf.frequency.value=300;feLoShelf.gain.value=S.fe.eqLo?-6:0;
  feHiShelf=c.createBiquadFilter();feHiShelf.type='highshelf';feHiShelf.frequency.value=500;feHiShelf.gain.value=S.fe.eqHi?-10:0;
  feConv=c.createConvolver();feConv.buffer=AE.catRv();
  feDry=c.createGain();feDry.gain.value=Math.max(0,1-S.fe.rvAmt);
  feWet=c.createGain();feWet.gain.value=S.fe.rvAmt;
  feDel=c.createDelay(2);feDel.delayTime.value=.7;
  feDelFb=c.createGain();feDelFb.gain.value=.5;
  feDelWet=c.createGain();feDelWet.gain.value=.45;
  feDel.connect(feDelFb);feDelFb.connect(feDel);feDel.connect(feDelWet);
  feMaster.connect(feLoShelf);feLoShelf.connect(feHiShelf);
  feHiShelf.connect(feDry);feDry.connect(c.destination);
  feHiShelf.connect(feConv);feConv.connect(feWet);feWet.connect(c.destination);
  feHiShelf.connect(feDel);feDelWet.connect(c.destination);
  return feMaster;
}
function destroyFeChain(){
  try{feMaster?.disconnect();feConv?.disconnect();feDel?.disconnect();feDelFb?.disconnect();feDelWet?.disconnect();feDry?.disconnect();feWet?.disconnect();feLoShelf?.disconnect();feHiShelf?.disconnect()}catch(e){}
  feMaster=feConv=feDel=feDelFb=feDelWet=feDry=feWet=feLoShelf=feHiShelf=null;libConnected=false;
}

function startPentatonic(vol,scaleName){
  const c=AE.g();ensureFeChain();feMaster.gain.value=vol;lastHighTime=0;
  const intervals=FE_SCALES[scaleName]||FE_SCALES['Pentatonic'];
  const valid=[];for(let oct=2;oct<=8;oct++)for(const iv of intervals){const midi=oct*12+iv;const freq=m2f(midi);if(freq>=100&&freq<=2000)valid.push({midi,freq})}
  if(!valid.length)return;

    const vib=c2.createOscillator(),vg=c2.createGain();vib.type='sine';vib.frequency.value=2.5+Math.random()*2;vg.gain.value=.8;vib.connect(vg);vg.connect(o.frequency);vib.start(t);vib.stop(t+dur);
    ga.gain.setValueAtTime(0,t);ga.gain.linearRampToValueAtTime(.1+Math.random()*.06,t+1.2);ga.gain.setValueAtTime(.08+Math.random()*.04,t+dur*.4);ga.gain.exponentialRampToValueAtTime(.001,t+dur);

function parseChord(inp){if(!inp?.trim())return null;const str=inp.trim();const nv={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  let i=0;const root=str[0]?.toUpperCase();if(!nv.hasOwnProperty(root))return null;i=1;let rv=nv[root];
  if(str[i]==='#'||str[i]==='♯'){rv=(rv+1)%12;i++}else if((str[i]==='b'&&i===1&&root!=='B')||str[i]==='♭'){rv=(rv+11)%12;i++}
  let q=str.slice(i).replace(/minor|min/gi,'m').replace(/major|maj(?=[79])/gi,'maj').replace(/dominant/gi,'');
  q=q.replace(/^M(?=[79])/g,'maj').replace(/^M$/g,'').replace(/^-/g,'m').replace(/^Δ/g,'maj').replace(/^°/g,'dim').replace(/^ø/g,'m7b5').replace(/^[+]/g,'aug');
  if(!CI[q]){let f=null;for(const t of[q,q.toLowerCase()])if(CI[t]){f=t;break}if(!f)return null;q=f}
  const iv=CI[q],notes=iv.map(x=>(rv+x)%12),inversions=[];
  for(let inv=0;inv<notes.length;inv++){const r=[...notes.slice(inv),...notes.slice(0,inv)];
    inversions.push({notes:r,bass:r[0],name:inv===0?'Root':`${inv}${['','st','nd','rd'][inv]||'th'} inv`})}
  return{root:rv,notes,inversions,display:`${SN[rv]}${q}`}}

let tStr,tAn,tAni,tCtx,lastTunerUpdate=0;
function autoC(buf,sr){let sz=buf.length,rms=0;for(let i=0;i<sz;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/sz);
  if(rms<.005)return-1;let r1=0,r2=sz-1;for(let i=0;i<sz/2;i++)if(Math.abs(buf[i])<.12){r1=i;break}
  for(let i=1;i<sz/2;i++)if(Math.abs(buf[sz-i])<.12){r2=sz-i;break}buf=buf.slice(r1,r2);sz=buf.length;if(sz<2)return-1;
  const c=new Float32Array(sz);for(let i=0;i<sz;i++)for(let j=0;j<sz-i;j++)c[i]+=buf[j]*buf[j+i];
  let d=0;while(d<sz-1&&c[d]>c[d+1])d++;let mx=-1,mp=-1;for(let i=d;i<sz;i++)if(c[i]>mx){mx=c[i];mp=i}
  if(mp<1||mp>=sz-1)return-1;let T=mp;const x1=c[T-1],x2=c[T],x3=c[T+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a)T-=b/(2*a);return sr/T}
