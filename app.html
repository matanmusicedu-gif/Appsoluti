<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--b1:#222;--b2:#2e2e2e;--t1:#e8e4de;--t2:#9a9590;--t3:#555;--tb:#c0bbb4;--ac:#e8a840;--acg:rgba(232,168,64,.1);--grn:#4ade80;--red:#f87171;--amb:#fbbf24;--sab:env(safe-area-inset-bottom,0px);--pk-w-bg:linear-gradient(180deg,#e8e2d8 0%,#f0ece4 5%,#f8f5ef 15%,#fffef8 30%,#ffffff 50%,#fefcf7 65%,#f8f4eb 80%,#f0eadf 90%,#e8e0d3 96%,#ddd5c5 100%);--pk-w-border:rgba(120,110,95,.35);--pk-w-shadow:0 4px 8px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.1),inset 0 -4px 6px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,250,.95),inset 1px 0 0 rgba(255,255,250,.4),inset -1px 0 0 rgba(0,0,0,.03);--pk-w-press:linear-gradient(180deg,#d5ccbb 0%,#e0d8cc 30%,#e8e2d8 60%,#ddd5c8 100%);--pk-b-bg:linear-gradient(180deg,#3a3530 0%,#2a2520 15%,#1e1a16 35%,#151210 60%,#0e0c0a 80%,#080706 100%);--pk-b-shadow:3px 3px 8px rgba(0,0,0,.6),-1px 0 2px rgba(0,0,0,.3),inset 0 1px 2px rgba(255,255,255,.08),inset 0 -1px 3px rgba(0,0,0,.4);--pk-b-press:linear-gradient(180deg,#40382e 0%,#302820 40%,#201a14 70%,#181410 100%)}
:root.bright-mode{--bg:#f5f1ed;--s1:#ebe5dd;--s2:#e0d8cf;--b1:#d9cfc5;--b2:#ccc1b6;--t1:#2a2520;--t2:#4a4540;--t3:#8a8077;--tb:#6b6258;--ac:#d97706;--acg:rgba(217,119,6,.12);--grn:#15803d;--red:#b91c1c;--amb:#b45309;--pk-w-bg:linear-gradient(180deg,#ede8df 0%,#f5f1ea 5%,#faf7f1 15%,#fefcf8 30%,#ffffff 50%,#fefdf9 65%,#f8f5ee 80%,#f2ede4 90%,#ebe4da 96%,#e0d8ca 100%);--pk-w-border:rgba(160,148,130,.4);--pk-w-shadow:0 4px 10px rgba(0,0,0,.14),0 1px 4px rgba(0,0,0,.08),inset 0 -4px 6px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,250,.98),inset 1px 0 0 rgba(255,255,250,.5),inset -1px 0 0 rgba(0,0,0,.02);--pk-w-press:linear-gradient(180deg,#ddd4c5 0%,#e8e0d4 40%,#e5ddd0 100%);--pk-b-bg:linear-gradient(180deg,#454038 0%,#302a22 20%,#201c16 50%,#1a1715 80%,#121010 100%);--pk-b-shadow:3px 3px 6px rgba(0,0,0,.4),-1px 0 2px rgba(0,0,0,.2),inset 0 1px 2px rgba(255,255,255,.05),inset 0 -1px 3px rgba(0,0,0,.3);--pk-b-press:linear-gradient(180deg,#4a4238 0%,#352d24 50%,#252018 100%)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;transition:background-color .3s ease,color .3s ease,border-color .3s ease}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Outfit',system-ui,sans-serif;font-weight:300;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select{font-family:inherit}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none;background:var(--s2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg);box-shadow:0 0 10px rgba(232,168,64,.35)}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--ac);border:3px solid var(--bg)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.hdr{display:flex;align-items:center;justify-content:center;padding:15px 16px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg);gap:6px;position:relative}
.logo{font-family:'Poiret One',sans-serif;font-size:20px;font-weight:400;letter-spacing:2px;color:var(--t1);position:relative;display:inline-flex;align-items:baseline;text-shadow:0 0 12px rgba(232,168,64,.15),0 0 25px rgba(232,168,64,.06);animation:titleGlow 12s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 10px rgba(255,255,255,.1),0 0 22px rgba(255,255,255,.05)}20%{text-shadow:0 0 10px rgba(251,191,36,.14),0 0 22px rgba(251,191,36,.07)}40%{text-shadow:0 0 10px rgba(64,224,208,.14),0 0 22px rgba(64,224,208,.07)}60%{text-shadow:0 0 10px rgba(180,120,255,.14),0 0 22px rgba(180,120,255,.07)}80%{text-shadow:0 0 10px rgba(255,150,200,.14),0 0 22px rgba(255,150,200,.07)}}
.logo-i{position:relative;display:inline-block}
.logo-i .dot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:4.5px;height:4.5px;border-radius:50%;background:var(--amb);box-shadow:0 0 6px var(--amb),0 0 14px rgba(251,191,36,.45);animation:glow 2.5s ease-in-out infinite alternate;z-index:2}
.fermata-svg{position:absolute;top:-4px;left:calc(50% - 0.3px);transform:translateX(-50%);width:12px;height:7px;z-index:1;animation:fGlow 3s ease-in-out infinite}
@keyframes glow{0%{box-shadow:0 0 4px var(--amb),0 0 8px rgba(251,191,36,.2)}100%{box-shadow:0 0 10px var(--amb),0 0 22px rgba(251,191,36,.55)}}
@keyframes fGlow{0%,100%{opacity:.5;filter:drop-shadow(0 0 2px rgba(251,191,36,.2))}50%{opacity:1;filter:drop-shadow(0 0 6px rgba(251,191,36,.6))}}
.cr{font-family:'Dancing Script',cursive;font-size:16px;color:var(--t3);margin-left:8px;letter-spacing:.5px}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0 84px;-webkit-overflow-scrolling:touch}
.tc{animation:fi .18s ease;padding:0 10px;min-height:calc(100dvh - 130px)}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(10px);border-top:1px solid var(--b1);padding-bottom:var(--sab);z-index:100}
.ni{display:flex;justify-content:space-around;align-items:center;height:54px;max-width:560px;margin:0 auto}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;border-radius:8px;transition:.15s}
.nb svg{width:19px;height:19px}.nb span{font-size:8.5px;letter-spacing:.3px}
.nb.on{color:var(--ac)}.nb:not(.on){color:var(--tb)}
.nd{width:3px;height:3px;border-radius:50%;background:var(--ac);margin-top:1px}
.pt{display:flex;gap:2px;background:var(--s1);border-radius:10px;padding:2px;border:1px solid var(--b1)}
:root.bright-mode .pt{border-width:2px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.pb{padding:5px 11px;border-radius:8px;font-size:11.5px;transition:.12s;white-space:nowrap}
.pb.on{background:var(--acg);color:var(--ac);border:1px solid rgba(232,168,64,.2)}.pb:not(.on){color:var(--t3);border:1px solid transparent}
.cd{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px}
:root.bright-mode .cd{border-width:2px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.bp{padding:9px 20px;border-radius:10px;background:var(--acg);border:1px solid rgba(232,168,64,.2);color:var(--ac);font-size:13px;font-weight:400;transition:.12s}
.bp:active{transform:scale(.97)}
.plb{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.12s;border-width:2px;border-style:solid}
.plb:active{transform:scale(.9)}
.plb.go{background:var(--acg);border-color:var(--ac);color:var(--ac)}.plb.st{background:rgba(248,113,113,.06);border-color:var(--red);color:var(--red)}
.lb{font-size:9px;color:var(--tb);text-transform:uppercase;letter-spacing:1.5px;text-align:center;display:block;margin-bottom:3px}
.ct{display:flex;flex-direction:column;align-items:center}
.dr-wrap{position:relative;width:100%;height:36px;padding:0 4px}
.dr-wrap input[type=range]{position:absolute;width:calc(100% - 8px);pointer-events:none;top:14px;left:4px;background:transparent!important}
.dr-wrap input[type=range]::-webkit-slider-thumb{pointer-events:auto;cursor:grab}
.dr-track{position:absolute;top:17px;height:6px;border-radius:3px;background:var(--ac);opacity:.35}
.bpm-val{font-size:13px;color:var(--ac);font-weight:500;min-width:36px;text-align:center;cursor:pointer;padding:2px 4px;border-radius:6px;border:1px solid transparent;transition:.15s}
.bpm-val:hover{border-color:var(--b2)}
.bpm-inp-s{width:50px;text-align:center;font-size:13px;font-weight:500;background:var(--s1);border:1px solid var(--ac);border-radius:6px;color:var(--ac);padding:2px 4px;outline:none;font-family:'Outfit'}
:root.bright-mode .bpm-inp-s{border-width:2px;font-weight:600}
.fe-bg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;z-index:0;pointer-events:none}
.fe-cv{width:100%;height:100%;display:block}
:root.bright-mode .fe-bg{background:transparent}
.mini-player{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);width:100%;margin-top:4px}
:root.bright-mode .mini-player{border-width:2px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.mini-pp{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--ac);background:var(--acg);color:var(--ac);flex-shrink:0}
.mini-pp:active{transform:scale(.9)}
:root.bright-mode .nav{background:rgba(245,241,237,.95);border-top-width:2px;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.gtr-circ-note{width:42px;height:42px;border-radius:50%;border:2px solid rgba(200,168,80,0.4);background:rgba(8,8,10,0.82);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;box-shadow:none}
:root.bright-mode .gtr-circ-note{border-color:rgba(217,119,6,0.5);background:rgba(217,119,6,0.1);color:rgba(139,99,10,0.95)}
.gtr-circ-note span{font-size:8px;font-weight:500;color:rgba(200,168,90,0.95);pointer-events:none;user-select:none}
:root.bright-mode .gtr-circ-note span{color:rgba(139,99,10,0.95)}
.bass-circ-note{width:42px;height:42px;border-radius:50%;border:2px solid rgba(200,168,80,0.4);background:rgba(8,8,10,0.82);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;box-shadow:none}
:root.bright-mode .bass-circ-note{border-color:rgba(217,119,6,0.5);background:rgba(217,119,6,0.1);color:rgba(139,99,10,0.95)}
.bass-circ-note span{font-size:14px;font-weight:700;color:rgba(200,168,90,0.95);pointer-events:none;user-select:none}
:root.bright-mode .bass-circ-note span{color:rgba(139,99,10,0.95)}
.theme-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1.5px solid var(--b2);cursor:pointer;transition:.2s;font-size:18px;color:var(--t1)}
.theme-toggle:hover{background:var(--s2);border-color:var(--ac);transform:translateY(-50%) scale(1.05)}
.theme-toggle:active{transform:translateY(-50%) scale(.95)}
</style>

<body>
<div class="app" id="app">
<header class="hdr">
  <div class="logo">
    <span>Appsolut</span><span class="logo-i">
      <svg class="fermata-svg" viewBox="0 0 12 7"><path d="M0.5 6 C0.5 2, 6 0, 6 0 C6 0, 11.5 2, 11.5 6" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity=".9"/></svg>
      <span class="dot"></span>i
    </span>
  </div>
  <span class="cr">by Matan Margolin</span>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
</header>
<main class="main" id="main"></main>
<nav class="nav"><div class="ni" id="nav"></div></nav>
</div>
<script>
const SN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],FN=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function chordDisp(chord,flat){if(!chord)return'';const nm=flat?FN:SN;let d=nm[chord.root]+(chord.type||'');if(chord.slashBass!==null&&chord.slashBass!==undefined)d+='/'+nm[chord.slashBass];return d;}
const m2f=n=>440*Math.pow(2,(n-69)/12),f2n=f=>Math.round(12*Math.log2(f/440))+69;
const cOff=(f,n)=>Math.round(1200*Math.log2(f/(440*Math.pow(2,(n-69)/12))));
const NC=['#d4a830','#6b2e8b','#b83838','#2a4888','#4488ee','#c09028','#5a2070','#993030','#1e3670','#e45090','#9050e0','#482060'];
const NCD=['#a08020','#4a1e6a','#882020','#162855','#2266cc','#806818','#381050','#701818','#0e1e48','#b03070','#6030b0','#301040'];
/* ═══ INTERVAL COLORS ═══ */
const IC={'R':'#fbbf24','\u266D2':'#059669','2':'#059669','\u266D3':'#2563eb','3':'#2563eb','#9':'#10b981',
  '4':'#ea580c','\u266D5':'#dc2626','\u266F4':'#ea580c','\u266F11':'#f97316','5':'#dc2626','\u266F5':'#dc2626',
  '6':'#7c3aed','\u266D6':'#8b5cf6','\u266D7':'#db2777','\u03947':'#be185d','7':'#be185d',
  '9':'#059669','\u266D9':'#10b981','11':'#ea580c','13':'#7c3aed','\u266D13':'#8b5cf6'};
function getIntervalColor(root,noteVal,chordIvs){return IC[getIntervalLabel(root,noteVal,chordIvs)]||'#888'}

/* ═══ IndexedDB ═══ */
const IDB={
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('appsoluti',1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('tracks',{keyPath:'id',autoIncrement:true})};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e)})},
  async save(name,blob){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').put({name,blob,date:Date.now()});tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})},
  async getAll(){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readonly');const r=tx.objectStore('tracks').getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)})},
  async del(id){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction('tracks','readwrite');tx.objectStore('tracks').delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})}
};

const _AD={
  hihat_hi:"./assets/audio/metronome/hihat-hi.ogg",
  hihat_lo:"./assets/audio/metronome/hihat-low.ogg",
  kick_hi:"./assets/audio/metronome/kick-hi.ogg",
  kick_lo:"./assets/audio/metronome/kick-low.ogg",
  rim_hi:"./assets/audio/metronome/rim-hi.ogg",
  rim_lo:"./assets/audio/metronome/rim-low.ogg",
  snap_hi:"./assets/audio/metronome/snap-hi.ogg",
  snap_lo:"./assets/audio/metronome/snap-low.ogg",
  wood_hi:"./assets/audio/metronome/wood-hi.ogg",
  wood_lo:"./assets/audio/metronome/wood-low.ogg",
  gtr_e6:"./assets/audio/guitar/e6.ogg",
  gtr_a5:"./assets/audio/guitar/a5.ogg",
  gtr_d4:"./assets/audio/guitar/d4.ogg",
  gtr_g3:"./assets/audio/guitar/g3.ogg",
  gtr_b2:"./assets/audio/guitar/b2.ogg",
  gtr_e1:"./assets/audio/guitar/e1.ogg",
  snare_hi:"./assets/audio/metronome/snare-hi.ogg",
  snare_lo:"./assets/audio/metronome/snare-low.ogg"};

/* ═══ AUDIO ENGINE ═══ */
const AE=(()=>{
let ctx,rvB,catB;
const g=()=>{if(!ctx||ctx.state==='closed')ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx};
const rv=()=>{if(rvB)return rvB;const c=g(),l=c.sampleRate*2.5,b=c.createBuffer(2,l,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.6))*.25}rvB=b;return b};
const catRv=()=>{if(catB)return catB;const c=g(),l=c.sampleRate*5,b=c.createBuffer(2,l,c.sampleRate);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++){const t=i/c.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t/2.2)*.22*(1+Math.sin(t*1.3)*.15)}}catB=b;return b};

/* ── Sample buffer system ── */
const _SB={};let _SBL=false;
function _ldSamp(key,src){
  const c=g();if(c.state==='closed')return;
  if(src.startsWith('data:')){
    try{const bin=atob(src.split(',')[1]);const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    c.decodeAudioData(arr.buffer.slice(0),buf=>{_SB[key]=buf;},err=>{console.warn('decode fail',key)});}
    catch(e){console.warn('load fail',key,e);}}
  else{fetch(src).then(r=>r.arrayBuffer()).then(ab=>{c.decodeAudioData(ab,buf=>{_SB[key]=buf;},err=>{console.warn('decode fail',key)})}).catch(e=>{console.warn('load fail',key,e)});}}
function _doLoad(){Object.entries({..._AD,...BASS_SAMPS}).forEach(([k,v])=>_ldSamp(k,v));}
function ensureSamps(){if(_SBL)return;_SBL=true;const c=g();
  if(c.state==='running'){_doLoad();}else{c.resume().then(_doLoad).catch(_doLoad);}}
function playSamp(key,t,vol=1){const c=g();const buf=_SB[key];if(!buf)return false;
  const s=c.createBufferSource();s.buffer=buf;const ga=c.createGain();ga.gain.value=vol;
  s.connect(ga);ga.connect(c.destination);s.start(t||c.currentTime);return true;}
/* Track currently playing guitar samples by string index */
const gtrPlayingSources={};
function stopGtrSamp(strIdx){
  if(gtrPlayingSources[strIdx]){
    try{gtrPlayingSources[strIdx].stop();}catch(e){}
    gtrPlayingSources[strIdx]=null;
  }
}
function playGtrSamp(strIdx,semitones){ensureSamps();
  stopGtrSamp(strIdx);
  const c=g();
  const keys=['gtr_e6','gtr_a5','gtr_d4','gtr_g3','gtr_b2','gtr_e1'];
  const key=keys[strIdx];const buf=_SB[key];
  if(!buf){setTimeout(()=>playGtrSamp(strIdx,semitones),200);return;}
  const s=c.createBufferSource();s.buffer=buf;
  if(semitones!==0)s.playbackRate.value=Math.pow(2,semitones/12);
  const ga=c.createGain();ga.gain.value=0.85;s.connect(ga);ga.connect(c.destination);s.start(c.currentTime);
  gtrPlayingSources[strIdx]=s;
}
const BASS_SAMPS={"0":"./assets/audio/bass/e4.ogg","1":"./assets/audio/bass/a3.ogg","2":"./assets/audio/bass/d2.ogg","3":"./assets/audio/bass/g1.ogg"};
/* ═══ PIANO SAMPLES — FSS6 Royers Grand, L1 layer (sparse: 8 samples) ═══ */
const PIANO_SAMPS_MAP=[
{midi:12,key:'pno_C0'},{midi:26,key:'pno_D1'},{midi:40,key:'pno_E2'},

function autoC(buf,sr){const sz=buf.length;let rms=0;for(let i=0;i<sz;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/sz);
  if(rms<.008)return-1;

  for(let i=0;i<sz/2;i++)if(Math.abs(buf[i])>=thresh){r1=i;break}
  for(let i=sz-1;i>sz/2;i--)if(Math.abs(buf[i])>=thresh){r2=i;break}
  const tb=buf.slice(r1,r2+1),tl=tb.length;if(tl<100)return-1;
  /* NSDF */
  const nsdf=new Float32Array(tl);
  for(let t=0;t<tl;t++){let num=0,d1=0,d2=0;
    for(let j=0;j<tl-t;j++){num+=tb[j]*tb[j+t];d1+=tb[j]*tb[j];d2+=tb[j+t]*tb[j+t]}
    nsdf[t]=d1+d2>0?2*num/(d1+d2):0}
  let fn=1;while(fn<tl&&nsdf[fn]>0)fn++;
  let mv=0,mi=-1;for(let i=fn;i<tl;i++){if(nsdf[i]>mv){mv=nsdf[i];mi=i}}
  if(mi<2||mv<.3)return-1;
  let T=mi;if(T>0&&T<tl-1){const a2=nsdf[T-1],b2=nsdf[T],c2=nsdf[T+1];
    const dl=(a2-c2)/(2*(a2-2*b2+c2));if(Math.abs(dl)<1)T+=dl}
  const freq=sr/T;
  if(T>4){const ht=Math.round(T/2);if(ht>fn&&ht<tl&&nsdf[ht]>mv*.85)return sr/ht}
  return freq}

/* ═══ PIANO VISUALIZER ═══ */
let _visNotes=[],_visAnim=null;
const VIS_DURATION=4;
function addVisNote(midi){const n={midi,startTime:performance.now(),duration:0,held:true};_visNotes.push(n);if(_visNotes.length>200)_visNotes.shift();return n;}
function endVisNote(n){if(n){n.held=false;n.duration=Math.max(120,performance.now()-n.startTime);}}
function initPianoVis(cvs,piState){
  const dpr=window.devicePixelRatio||1;cvs.width=cvs.clientWidth*dpr;cvs.height=cvs.clientHeight*dpr;
  const c=cvs.getContext('2d');c.scale(dpr,dpr);const W=cvs.clientWidth,H=cvs.clientHeight;
  const oct=3,tw=oct*7,kw=W/tw;
  const wP=[0,2,4,5,7,9,11],bSemi=[1,3,6,8,10];
  const bMap={1:0.62,3:1.72,6:3.58,8:4.65,10:5.72};
  function draw(){
    if(!document.getElementById('pno-vis')){_visAnim=null;return;}
    c.clearRect(0,0,W,H);const now=performance.now();
    const pal=VIS_PALETTES[piState.visPalette]||VIS_PALETTES.gold;
    /* Grid lines */
    c.strokeStyle='rgba(255,255,255,.04)';c.lineWidth=1;
    for(let i=0;i<=tw;i++){c.beginPath();c.moveTo(i*kw,0);c.lineTo(i*kw,H);c.stroke();}
    /* Bottom glow line */
    const grd=c.createLinearGradient(0,H-6,0,H);grd.addColorStop(0,`rgba(${pal.wh},.2)`);grd.addColorStop(1,`rgba(${pal.wh},0)`);
    c.fillStyle=grd;c.fillRect(0,H-6,W,6);
    /* Falling notes */
    const baseM=piState.oct*12;
    _visNotes.forEach(n=>{
      const elapsed=(now-n.startTime)/1000;
      const y=H-(elapsed/VIS_DURATION)*H;if(y<-40)return;
      const rel=n.midi-baseM;const octOff=Math.floor(rel/12);const semi=((rel%12)+12)%12;
      const isBlk=bSemi.includes(semi);
      let x,w;
      if(!isBlk){const wIdx=wP.indexOf(semi);if(wIdx<0)return;x=(octOff*7+wIdx)*kw;w=kw;}
      else{if(!(semi in bMap))return;x=(octOff*7+bMap[semi])*kw;w=kw*0.6;}
      if(x<-kw||x>W+kw)return;
      const noteDur=n.held?(now-n.startTime):n.duration;
      const nh=Math.max(10,(noteDur/1000/VIS_DURATION)*H);
      const alpha=Math.max(0.3,1-elapsed/VIS_DURATION);
      const rgb=isBlk?pal.bl:pal.wh;
      /* Outer glow */
      c.save();c.shadowColor=`rgba(${rgb},${alpha*.7})`;c.shadowBlur=12;
      c.fillStyle=`rgba(${rgb},${alpha})`;
      c.beginPath();
      if(c.roundRect)c.roundRect(x+1,y,w-2,nh,4);else{c.rect(x+1,y,w-2,nh);}
      c.fill();c.restore();
      /* Inner bright core */
      c.fillStyle=`rgba(${rgb},${alpha*.3})`;
      c.beginPath();
      if(c.roundRect)c.roundRect(x+w*0.2,y+2,w*0.6-2,nh-4,2);else{c.rect(x+w*0.2,y+2,w*0.6-2,nh-4);}
      c.fill();
      /* Hit glow at bottom */
      if(y+nh>=H-5&&y<H){const gw=c.createRadialGradient(x+w/2,H,0,x+w/2,H,w*1.5);
        gw.addColorStop(0,`rgba(${rgb},.5)`);gw.addColorStop(0.5,`rgba(${rgb},.15)`);gw.addColorStop(1,'transparent');
        c.fillStyle=gw;c.fillRect(x-w,H-w*1.5,w*3,w*1.5);}
    });
    _visNotes=_visNotes.filter(n=>(now-n.startTime)/1000<VIS_DURATION+1);
    _visAnim=requestAnimationFrame(draw);
  }
  if(_visAnim)cancelAnimationFrame(_visAnim);draw();
}

/* ═══ WEB MIDI INPUT ═══ */
let _midiAccess=null,_midiEnabled=false,_midiActiveNotes={};
function initMIDI(){
  if(_midiAccess)return Promise.resolve(_midiAccess);
  if(!navigator.requestMIDIAccess)return Promise.reject('Web MIDI not supported');
  return navigator.requestMIDIAccess({sysex:false}).then(access=>{
    _midiAccess=access;
    _bindMIDIInputs();
    access.onstatechange=()=>_bindMIDIInputs();
    return access;
  });
}
function _bindMIDIInputs(){
  if(!_midiAccess)return;
  _midiAccess.inputs.forEach(inp=>{inp.onmidimessage=_onMIDIMsg});
}
function _onMIDIMsg(e){
  if(!_midiEnabled||aTab!=='piano')return;
  const[status,note,velocity]=e.data;const cmd=status&0xF0;
  const s=S.pi;
  if(cmd===0x90&&velocity>0){
    /* Note On */
    AE.g();if(s.type==='piano')AE.pianoSamp(note,1.8);else AE.epianoSamp(note,1.8);
    const vn=s.vis?addVisNote(note):null;
    _midiActiveNotes[note]=vn;
    _highlightMidiKey(note,true);
  }else if(cmd===0x80||(cmd===0x90&&velocity===0)){
    /* Note Off */
    if(_midiActiveNotes[note]){endVisNote(_midiActiveNotes[note]);delete _midiActiveNotes[note];}
    _highlightMidiKey(note,false);
  }
}
function _highlightMidiKey(midi,on){
  const el=document.querySelector(`[data-midi="${midi}"]`);
  if(!el)return;
  const isBlk=el.dataset.black==='1';
  if(on){el.style.background=isBlk?'var(--pk-b-press)':'var(--pk-w-press)';el.style.transform=isBlk?'translateY(1px)':'translateY(2px)';}
  else{el.style.background=isBlk?'var(--pk-b-bg)':'var(--pk-w-bg)';el.style.transform='none';}
}
function getMIDIInputNames(){
  if(!_midiAccess)return[];
  const names=[];_midiAccess.inputs.forEach(inp=>names.push(inp.name));return names;
}

/* ═══ COMPUTER KEYBOARD PIANO INPUT ═══ */
const KB_MAP={'q':0,'2':1,'w':2,'3':3,'e':4,'r':5,'5':6,'t':7,'6':8,'y':9,'7':10,'u':11};
const KB_OCT_DOWN='1',KB_OCT_UP='=';
let _kbActiveNotes={};
function _onKbDown(e){
  if(!S.pi.kbEnabled||aTab!=='piano')return;
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(k===KB_OCT_DOWN){S.pi.oct=Math.max(1,S.pi.oct-1);R();return;}
  if(k===KB_OCT_UP){S.pi.oct=Math.min(6,S.pi.oct+1);R();return;}
  const semi=KB_MAP[k];if(semi===undefined)return;
  e.preventDefault();
  const midi=S.pi.oct*12+semi;
  const s=S.pi;
  AE.g();if(s.type==='piano')AE.pianoSamp(midi,2.5,s.vol);else AE.epianoSamp(midi,2.5,s.vol);
  const vn=s.vis?addVisNote(midi):null;
  _kbActiveNotes[k]={midi,vn};
  _highlightMidiKey(midi,true);
}
function _onKbUp(e){
  if(!S.pi.kbEnabled||aTab!=='piano')return;
  const k=e.key.toLowerCase();
  const an=_kbActiveNotes[k];
  if(an){endVisNote(an.vn);_highlightMidiKey(an.midi,false);delete _kbActiveNotes[k];}
}
document.addEventListener('keydown',_onKbDown);
document.addEventListener('keyup',_onKbUp);

let _scWidget=null,_scBound=false;
function _bindSCLoop(){

function _doBindSC(){

}

/* ═══ THEME TOGGLE ═══ */
function initThemeToggle(){
  const toggle=document.getElementById('themeToggle');
  const savedTheme=localStorage.getItem('appsoluti-theme')||'dark';
  
  function setTheme(theme){
    if(theme==='bright'){
      document.documentElement.classList.add('bright-mode');
      toggle.textContent='🌙';
      toggle.title='Switch to dark theme';
    } else {
      document.documentElement.classList.remove('bright-mode');
      toggle.textContent='☀️';
      toggle.title='Switch to bright theme';
    }
    localStorage.setItem('appsoluti-theme',theme);
  }
  
  setTheme(savedTheme);
  
  toggle.addEventListener('click',()=>{
    const current=localStorage.getItem('appsoluti-theme')||'dark';
    setTheme(current==='dark'?'bright':'dark');
    R();
  });
}
